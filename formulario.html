<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Document</title>
</head>

<body>

    <!--esta es una seccion visible de la pagina web-->

    <h1>REGISTRO DE ESTUDIANTES - ESPECIALIDAD EN SISTEMAS 2026</h1>

    <!--Formulario web-->

    <form action="#" method="">

        <!--Seccion de datos del estudiante-->

        <fieldset>

            <legend>Datos del estudiante</legend>

            <label for="apellidos">Apellidos:</label>
            <input type="text" id="apellidos" name="apellidos">

            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre">

            <br><br>

            <label for="fecha">Fecha de nacimiento:</label>
            <input type="date" id="fecha" name="fecha">

            <label for="lugar">Lugar de nacimiento:</label>
            <input type="text" id="lugar" name="lugar">

            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="edad">

            <br><br>

            <label>Tipo Documento Identidad:</label>

            <label>T.I:</label>
            <input type="radio" name="documento">

            <label>C.C:</label>
            <input type="radio" name="documento">

            <label for="numeroDocumento">
                Número Documento Identidad:
            </label>

            <input type="text"
                id="numeroDocumento"
                name="numeroDocumento">

            <br><br>

            <label for="expedicion">
                Lugar Expedición Documento Identidad:
            </label>

            <input type="text"
                id="expedicion"
                name="expedicion">

            <br><br>

            <label for="direccion">Dirección:</label>
            <input type="text" id="direccion" name="direccion">

            <label for="barrio">Barrio:</label>
            <input type="text" id="barrio" name="barrio">

            <label for="ciudad">Ciudad:</label>
            <input type="text" id="ciudad" name="ciudad">

            <br><br>

            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono">

            <label for="celular">Celular:</label>
            <input type="tel" id="celular" name="celular">

            <br><br>

            <label for="emailPersonal">E-mail personal:</label>
            <input type="email"
                id="emailPersonal"
                name="emailPersonal">

            <label for="emailInstitucional">
                E-mail institucional:
            </label>

            <input type="email"
                id="emailInstitucional"
                name="emailInstitucional">

            <br><br>

            <label for="sangre">Tipo de Sangre:</label>
            <input type="text" id="sangre" name="sangre">

            <label for="eps">EPS:</label>
            <input type="text" id="eps" name="eps">

            <br><br>

            <label>¿Sufre alguna enfermedad?</label>

            <label>Si:</label>
            <input type="radio" name="enfermedad">

            <label>No:</label>
            <input type="radio" name="enfermedad">

            <label for="cual">¿Cuál?:</label>
            <input type="text" id="cual" name="cual">

            <br><br>

            <label for="estrato">
                Estrato socioeconómico:
            </label>

            <input type="number" id="estrato" name="estrato">

            <label>Familias en Acción:</label>

            <label>Si:</label>
            <input type="radio" name="familias">

            <label>No:</label>
            <input type="radio" name="familias">

            <br><br>

            <label for="religion">Tipo de Religión:</label>
            <input type="text" id="religion" name="religion">

            <br><br>

            <label>
                ¿Cuáles son las principales actividades que usted realiza en su tiempo libre?
            </label>

            <br>

            <textarea rows="5" cols="100"></textarea>

            <br><br>

            <label>
                ¿Cuáles son sus propósitos y expectativas personales y académicas como estudiante de la Especialidad en Sistemas?
            </label>

            <br>

            <textarea rows="5" cols="100"></textarea>

        </fieldset>

        <br>

        <!--DATOS DEL PADRE-->

        <fieldset>

            <legend>DATOS DEL PADRE</legend>

            <label for="apellidoPadre">Apellidos:</label>
            <input type="text"
                id="apellidoPadre"
                name="apellidoPadre">

            <label for="nombrePadre">Nombre:</label>
            <input type="text"
                id="nombrePadre"
                name="nombrePadre">

            <br><br>

            <label for="direccionPadre">Dirección:</label>
            <input type="text"
                id="direccionPadre"
                name="direccionPadre">

            <label for="barrioPadre">Barrio:</label>
            <input type="text"
                id="barrioPadre"
                name="barrioPadre">

            <br><br>

            <label for="telefonoPadre">Teléfono:</label>
            <input type="tel"
                id="telefonoPadre"
                name="telefonoPadre">

            <label for="celularPadre">Celular:</label>
            <input type="tel"
                id="celularPadre"
                name="celularPadre">

            <br><br>

            <label for="emailPadre">E-mail:</label>
            <input type="email"
                id="emailPadre"
                name="emailPadre">

            <br><br>

            <label for="ocupacionPadre">Ocupación:</label>
            <input type="text"
                id="ocupacionPadre"
                name="ocupacionPadre"
                size="80">

        </fieldset>

        <br>

        <!--DATOS DE LA MADRE-->

        <fieldset>

            <legend>DATOS DE LA MADRE</legend>

            <label for="apellidoMadre">Apellidos:</label>
            <input type="text"
                id="apellidoMadre"
                name="apellidoMadre">

            <label for="nombreMadre">Nombre:</label>
            <input type="text"
                id="nombreMadre"
                name="nombreMadre">

            <br><br>

            <label for="direccionMadre">Dirección:</label>
            <input type="text"
                id="direccionMadre"
                name="direccionMadre">

            <label for="barrioMadre">Barrio:</label>
            <input type="text"
                id="barrioMadre"
                name="barrioMadre">

            <br><br>

            <label for="telefonoMadre">Teléfono:</label>
            <input type="tel"
                id="telefonoMadre"
                name="telefonoMadre">

            <label for="celularMadre">Celular:</label>
            <input type="tel"
                id="celularMadre"
                name="celularMadre">

            <br><br>

            <label for="emailMadre">E-mail:</label>
            <input type="email"
                id="emailMadre"
                name="emailMadre">

            <br><br>

            <label for="ocupacionMadre">Ocupación:</label>
            <input type="text"
                id="ocupacionMadre"
                name="ocupacionMadre"
                size="80">

        </fieldset>

        <br>

        <!--DATOS DEL ACUDIENTE-->

        <fieldset>

            <legend>DATOS DEL ACUDIENTE</legend>

            <p>
                (Persona que asistirá a las reuniones y entrega de boletines;
                ya sea madre, padre u otro)
            </p>

            <label for="apellidoAcudiente">Apellidos:</label>
            <input type="text"
                id="apellidoAcudiente"
                name="apellidoAcudiente">

            <label for="nombreAcudiente">Nombre:</label>
            <input type="text"
                id="nombreAcudiente"
                name="nombreAcudiente">

            <label for="parentesco">Parentesco:</label>
            <input type="text"
                id="parentesco"
                name="parentesco">

            <br><br>

            <label for="direccionAcudiente">Dirección:</label>
            <input type="text"
                id="direccionAcudiente"
                name="direccionAcudiente">

            <label for="barrioAcudiente">Barrio:</label>
            <input type="text"
                id="barrioAcudiente"
                name="barrioAcudiente">

            <br><br>

            <label for="telefonoAcudiente">Teléfono:</label>
            <input type="tel"
                id="telefonoAcudiente"
                name="telefonoAcudiente">

            <label for="celularAcudiente">Celular:</label>
            <input type="tel"
                id="celularAcudiente"
                name="celularAcudiente">

            <br><br>

            <label for="emailAcudiente">E-mail:</label>
            <input type="email"
                id="emailAcudiente"
                name="emailAcudiente">

            <br><br>

            <label for="ocupacionAcudiente">Ocupación:</label>
            <input type="text"
                id="ocupacionAcudiente"
                name="ocupacionAcudiente"
                size="80">

        </fieldset>

        <br>

        <button type="submit">Enviar formulario</button>

        <button type="reset">Limpiar datos</button>

    </form>

</body>

</html>
